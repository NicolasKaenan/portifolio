@if (project) {
  <div class="content">
    <h1 class="project-title">{{ project.title }}</h1>

    <div class="markdown-body">
      <markdown [data]="project.full_description"></markdown>
    </div>

    <div class="actions">
      <a [href]="project.project_url" target="_blank" class="btn-action btn-primary">
        <span>Abrir Projeto</span>
      </a>

      <a [href]="project.repository_url" target="_blank" class="btn-action btn-secondary">
        <span>Repositório GitHub</span>
      </a>
    </div>
  </div>
}
